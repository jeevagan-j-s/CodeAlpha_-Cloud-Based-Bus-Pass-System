<!DOCTYPE html>
<html>
<head>
    <title>Apply for Bus Pass</title>
</head>
<body>

    <h1>Bus Pass Application Form</h1>

    <form method="POST">

        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Student ID:</label><br>
        <input type="text" name="student_id" required><br><br>

        <label>College Name:</label><br>
        <input type="text" name="college" required><br><br>

        <label>Source:</label><br>
        <input type="text" name="source" required><br><br>

        <label>Destination:</label><br>
        <input type="text" name="destination" required><br><br>

        <label>Mobile Number:</label><br>
        <input type="tel" name="mobile" required><br><br>

        <button type="submit">Submit Application</button>

    </form>

    <br>

    <a href="/">⬅ Back to Home</a>

</body>
</html>
